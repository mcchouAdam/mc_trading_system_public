version: "3.8"
services:
  mc-redis:
    image: redis:latest
    container_name: mc-redis
    command: redis-server --requirepass "${REDIS_PASSWORD}"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  mc-postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: mc-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations/000_init_timescale.sql:/docker-entrypoint-initdb.d/init_timescale.sql
    restart: unless-stopped

  mc-api-server:
    build:
      context: .
      dockerfile: api_server/Dockerfile
    container_name: mc-api-server
    ports:
      - "8001:8080"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=prod
      - ZMQ_HOST=mc-market-data-streamer
    depends_on:
      - mc-redis
      - mc-postgres
      - mc-market-data-streamer
    volumes:
      - ./machine_learning/model_registry.json:/app/machine_learning/model_registry.json:ro
      - ./data/seed:/data/seed:ro
    restart: unless-stopped

  # --- C++ Base Infrastructure ---
  mc-cpp-base:
    build:
      context: ./deployment/cpp-builder-base
      dockerfile: Dockerfile
    image: mc-cpp-base:latest

  mc-market-data-streamer:
    build:
      context: .
      dockerfile: market_data_streamer/Dockerfile

    container_name: mc-market-data-streamer
    depends_on:
      - mc-redis
      - mc-cpp-base
    env_file:
      - .env
    ports:
      - "5555:5555"
      - "5556:5556"
    restart: unless-stopped
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - ENVIRONMENT=local
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -h \"$${REDIS_HOST}\" -p \"$${REDIS_PORT}\" -a \"$${REDIS_PASSWORD}\" get HEALTH:MARKET_DATA_STREAMER" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  mc-auth-manager:
    build:
      context: .
      dockerfile: auth_manager/Dockerfile
    container_name: mc-auth-manager
    depends_on:
      - mc-redis
      - mc-cpp-base
    env_file:
      - .env
    restart: unless-stopped
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      - ENVIRONMENT=local
    command: [ "python", "-u", "auth_manager/session_manager.py" ]

  mc-trading-engine:
    build:
      context: .
      dockerfile: trading_engine/Dockerfile

    container_name: mc-trading-engine
    depends_on:
      - mc-redis
      - mc-auth-manager
      - mc-market-data-streamer
      - mc-cpp-base
    restart: unless-stopped
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - ZMQ_HOST=mc-market-data-streamer
      - ENVIRONMENT=local

  mc-trade-manager:
    build:
      context: .
      dockerfile: trade_manager/Dockerfile
    container_name: mc-trade-manager
    depends_on:
      - mc-redis
      - mc-postgres
      - mc-auth-manager
    env_file:
      - .env
    restart: unless-stopped
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      - ENVIRONMENT=local
    volumes:
      - ./machine_learning:/app/machine_learning:ro
    command: [ "python", "-u", "trade_manager/order_executor.py" ]

  mc-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL}
        - VITE_WS_BASE_URL=${VITE_WS_BASE_URL}
    container_name: mc-frontend
    ports:
      - "3000:80"
    depends_on:
      - mc-api-server
    restart: unless-stopped

  # --- Management Tools ---
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    restart: unless-stopped
  # --- Cloudflare Tunnel for secure remote access ---
  mc-cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: mc-cloudflared
    restart: unless-stopped
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    command: tunnel run
    depends_on:
      - mc-frontend
      - mc-api-server

volumes:
  redis_data:
  postgres_data:
  portainer_data:
