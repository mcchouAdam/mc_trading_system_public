name: Reusable Docker Build

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      image_name:
        required: true
        type: string
      dockerfile:
        required: true
        type: string
      context:
        required: false
        type: string
        default: "."
      primary_tag:
        required: true
        type: string
      secondary_tag:
        required: true
        type: string
      build_args:
        required: false
        type: string
        default: ""
    secrets:
      AWS_ROLE_ARN:
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-${{ inputs.service_name }}
          aws-region: ap-east-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ inputs.image_name }}:${{ inputs.primary_tag }}
            ${{ steps.login-ecr.outputs.registry }}/${{ inputs.image_name }}:${{ inputs.secondary_tag }}
          build-args: |
            REGISTRY=${{ steps.login-ecr.outputs.registry }}/
            ${{ inputs.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
