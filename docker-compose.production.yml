x-logging: &default-logging
  driver: "local"
  options:
    max-size: "10m"
    max-file: "3"

services:
  mc-redis:
    image: redis:alpine
    container_name: mc-redis
    command: redis-server --requirepass "${REDIS_PASSWORD}"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    restart: always
    logging: *default-logging

  mc-postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: mc-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    logging: *default-logging
    command: postgres -c shared_preload_libraries=timescaledb

  mc-api-server:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/mc-api-server:${API_SERVER_TAG:-${IMAGE_TAG:-latest}}
    container_name: mc-api-server
    ports:
      - "8001:8080"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=prod
      - ZMQ_HOST=mc-market-data-streamer
    depends_on:
      - mc-redis
      - mc-postgres
    volumes:
      - ./machine_learning/model_registry.json:/app/machine_learning/model_registry.json:ro
    restart: always
    logging: *default-logging

  mc-market-data-streamer:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/mc-cpp-ingestor:${MARKET_DATA_STREAMER_TAG:-${IMAGE_TAG:-latest}}
    container_name: mc-market-data-streamer
    depends_on:
      - mc-redis
    restart: always
    logging: *default-logging
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}

  mc-auth-manager:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/mc-auth-manager:${AUTH_MANAGER_TAG:-${IMAGE_TAG:-latest}}
    container_name: mc-auth-manager
    depends_on:
      - mc-redis
      - mc-postgres
    restart: always
    logging: *default-logging
    env_file:
      - .env
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      - ENVIRONMENT=production
    command: [ "python", "-u", "auth_manager/session_manager.py" ]

  mc-trading-engine:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/mc-trading-engine:${TRADING_ENGINE_TAG:-${IMAGE_TAG:-latest}}
    container_name: mc-trading-engine
    depends_on:
      - mc-redis
      - mc-postgres
      - mc-auth-manager
    restart: always
    logging: *default-logging
    env_file:
      - .env
    environment:
      - AWS_ACCOUNT_ID=${AWS_ACCOUNT_ID}
      - AWS_REGION=${AWS_REGION}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      - ENVIRONMENT=production
      - ZMQ_HOST=mc-market-data-streamer

  mc-trade-manager:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/mc-trade-manager:${TRADING_MANAGER_TAG:-${IMAGE_TAG:-latest}}
    container_name: mc-trade-manager
    depends_on:
      - mc-redis
      - mc-postgres
      - mc-auth-manager
    restart: always
    logging: *default-logging
    env_file:
      - .env
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      - ENVIRONMENT=production
    volumes:
      - ./machine_learning:/app/machine_learning:ro
    command: [ "python", "-u", "trade_manager/order_executor.py" ]

  mc-frontend:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/mc-frontend:${FRONTEND_TAG:-${IMAGE_TAG:-latest}}
    container_name: mc-frontend
    ports:
      - "3000:80"
    depends_on:
      - mc-api-server
    restart: always
    logging: *default-logging

  mc-portainer:
    image: portainer/portainer-ce:latest
    container_name: mc-portainer
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    restart: always
    logging: *default-logging

  mc-cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: mc-cloudflared
    command: tunnel run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    restart: always
    depends_on:
      - mc-frontend
      - mc-api-server
    logging: *default-logging

volumes:
  redis_data:
  postgres_data:
  portainer_data:
